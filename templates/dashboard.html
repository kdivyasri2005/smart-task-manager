<!DOCTYPE html>
<html>

<head>

    <title>Smart Task Manager</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial;
            background:#f4f7fc;
        }

        .container{
            width:90%;
            max-width:1200px;
            margin:auto;
            padding:30px 0;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .logout-btn{
            background:red;
            color:white;
            padding:10px 18px;
            border-radius:8px;
            text-decoration:none;
        }

        .analytics{
            display:grid;
            grid-template-columns:
            repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        .card h2{
            margin-bottom:10px;
        }

        .card p{
            font-size:30px;
            font-weight:bold;
        }

        .action-buttons{
            display:flex;
            gap:20px;
            margin-bottom:30px;
        }

        .btn{
            padding:14px 22px;
            border:none;
            border-radius:10px;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        .add-btn{
            background:#4CAF50;
        }

        .get-btn{
            background:#2196F3;
        }

        .task-container{
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .task-card{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
            animation:fadeIn 0.5s ease;
        }

        .task-card h3{
            margin-bottom:15px;
            color:#333;
        }

        .task-card p{
            margin-bottom:10px;
            color:#555;
        }

        .task-actions{
            margin-top:15px;
            display:flex;
            gap:10px;
        }

        .update-btn{
            background:#2196F3;
        }

        .delete-btn{
            background:red;
        }

        /* ✅ MODERN NOTIFICATION */

        #notification{

            position:fixed;

            top:20px;
            left:50%;

            transform:translateX(-50%);

            min-width:320px;

            background:#111827;
            color:white;

            padding:18px 30px;

            border-radius:14px;

            display:none;

            text-align:center;

            z-index:9999;

            font-size:16px;

            font-weight:bold;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.3);

            animation:slideDown 0.4s ease;
        }

        @keyframes slideDown{

            from{
                opacity:0;

                transform:
                translateX(-50%)
                translateY(-30px);
            }

            to{
                opacity:1;

                transform:
                translateX(-50%)
                translateY(0px);
            }
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0px);
            }
        }

        @media(max-width:768px){

            .action-buttons{
                flex-direction:column;
            }

            .btn{
                width:100%;
            }
        }

    </style>

</head>

<body>

<div id="notification"></div>

<div class="container">

    <div class="header">

        <h1>Smart Task Manager</h1>

        <a href="/logout"
           class="logout-btn">

            Logout

        </a>

    </div>

    <!-- ANALYTICS -->

    <div class="analytics">

        <div class="card">
            <h2>Total Tasks</h2>
            <p id="totalTasks">0</p>
        </div>

        <div class="card">
            <h2>Completed</h2>
            <p id="completedTasks">0</p>
        </div>

        <div class="card">
            <h2>Pending</h2>
            <p id="pendingTasks">0</p>
        </div>

        <div class="card">
            <h2>Completion %</h2>
            <p id="completionPercentage">0%</p>
        </div>

    </div>

    <!-- BUTTONS -->

    <div class="action-buttons">

        <button class="btn add-btn"
                onclick="window.location.href='/add_task_page'">

            Add Task

        </button>

        <button class="btn get-btn"
                onclick="loadTasks()">

            Get All Tasks

        </button>

    </div>

    <!-- TASKS -->

    <div class="task-container"
         id="taskContainer">

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>

<script>

    const socket = io();
    // ✅ SHOW UPDATE NOTIFICATION AFTER REDIRECT

window.addEventListener('load', () => {

    fetch('/get_notification')

    .then(response => response.json())

    .then(data => {

        if(data.message){

            showNotification(data.message);
        }
    });
});

    let tasksVisible = false;

    // ✅ NOTIFICATION

    function showNotification(message){

        let notification =
        document.getElementById('notification');

        notification.innerText = message;

        notification.style.display = 'block';

        setTimeout(() => {

            notification.style.display = 'none';

        },3000);
    }

    // ✅ LOAD ANALYTICS

    function loadAnalytics(){

        fetch('/task_analytics')

        .then(response => response.json())

        .then(data => {

            document.getElementById(
            'totalTasks').innerText =
            data.total_tasks;

            document.getElementById(
            'completedTasks').innerText =
            data.completed_tasks;

            document.getElementById(
            'pendingTasks').innerText =
            data.pending_tasks;

            document.getElementById(
            'completionPercentage').innerText =
            data.completion_percentage + "%";
        });
    }

    // ✅ LOAD TASKS

    function loadTasks(){

        tasksVisible = true;

        fetch('/get_tasks')

        .then(response => response.json())

        .then(tasks => {

            let container =
            document.getElementById('taskContainer');

            container.innerHTML='';

            if(tasks.length === 0){

                container.innerHTML = `
                    <div class="task-card">
                        <h3>No Tasks Found</h3>
                    </div>
                `;

                return;
            }

            tasks.forEach(task => {

                container.innerHTML += `

                    <div class="task-card">

                        <h3>${task.title}</h3>

                        <p>
                        <b>Description:</b>
                        ${task.description}
                        </p>

                        <p>
                        <b>Priority:</b>
                        ${task.priority}
                        </p>

                        <p>
                        <b>Status:</b>
                        ${task.status}
                        </p>

                        <p>
                        <b>Date:</b>
                        ${task.created_date}
                        </p>

                        <div class="task-actions">

                            <button class="btn update-btn"
                            onclick="
                            window.location.href=
                            '/update_task_page/${task.id}'
                            ">

                                Update

                            </button>

                            <button class="btn delete-btn"
                            onclick="deleteTask(${task.id})">

                                Delete

                            </button>

                        </div>

                    </div>
                `;
            });
        });
    }

    // ✅ DELETE TASK

    function deleteTask(id){

        fetch(`/delete_task/${id}`, {

            method:'DELETE'
        })

        .then(response => response.json())

        .then(data => {

            sessionStorage.setItem(
                'notification',
                '🗑️ Task Deleted Successfully'
            );

            loadAnalytics();

            if(tasksVisible){
                loadTasks();
            }

            showNotification(
                '🗑️ Task Deleted Successfully'
            );
        });
    }

    // ✅ WEBSOCKET

    socket.on(
        'task_notification',
        function(data){

            console.log(data.message);

            showNotification(data.message);

            loadAnalytics();

            if(tasksVisible){
                loadTasks();
            }
        }
    );

    // ✅ INITIAL LOAD

    window.onload = function(){

        loadAnalytics();

        // ✅ SHOW SAVED NOTIFICATION

        let savedMessage =
        sessionStorage.getItem(
            'notification'
        );

        if(savedMessage){

            showNotification(savedMessage);

            sessionStorage.removeItem(
                'notification'
            );
        }
    }

</script>

</body>

</html>
